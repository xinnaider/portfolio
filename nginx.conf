# Primeira execução: só HTTP (para o certbot validar o domínio)
# Depois de gerar o certificado, descomente o bloco HTTPS abaixo

server {
    listen 80;
    server_name jfernando.dev www.jfernando.dev;

    # Challenge do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Após ter o certificado, redireciona HTTP → HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name jfernando.dev www.jfernando.dev;

    ssl_certificate     /etc/letsencrypt/live/jfernando.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jfernando.dev/privkey.pem;

    # Compressão
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Assets do Nuxt (cache longo, já tem hash no nome)
    location /_nuxt/ {
        proxy_pass http://portfolio:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://portfolio:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # Umami analytics — proxy with path rewriting
    location /analytics/ {
        proxy_pass http://umami:3000/;
        proxy_redirect / /analytics/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/html application/javascript text/css;
        sub_filter '/_next/' '/analytics/_next/';
        sub_filter 'href="/' 'href="/analytics/';
        sub_filter 'src="/' 'src="/analytics/';
        sub_filter '"/api/' '"/analytics/api/';
        sub_filter 'action="/' 'action="/analytics/';
    }
    location = /analytics {
        return 301 /analytics/;
    }

    # SSR — tudo o resto
    location / {
        proxy_pass http://portfolio:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
